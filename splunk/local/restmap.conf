[local-proxy:tlPackage-supervisor-get-/node-arch/admin/v1/packages]
capability = list_health
match = /node-arch/admin/v1/packages

[local-proxy:tlPackage-supervisor-get-/node-arch/admin/v1/packages/*]
capability = list_health
match = /node-arch/admin/v1/packages/*

[local-proxy:tlPackage-scimGroup]
match = /identity/provisioning/v1/scim/v2/Groups/*
requireAuthentication = false

[local-proxy:tlPackage-scimGroups]
match = /identity/provisioning/v1/scim/v2/Groups
requireAuthentication = false

[local-proxy:tlPackage-scimUser]
match = /identity/provisioning/v1/scim/v2/Users/*
requireAuthentication = false

[local-proxy:tlPackage-scimUsers]
match = /identity/provisioning/v1/scim/v2/Users
requireAuthentication = false

[local-proxy:tlPackage-agent-management-all-endpoints]
capability = edit_deployment_server
capability.get = list_deployment_server
match = /agent-management
requireAuthentication = true

[local-proxy:tlPackage-agent-management-all-endpoints-webport-1]
capability = edit_deployment_server
capability.get = list_deployment_server
match = /agent-management/*
requireAuthentication = true

[local-proxy:tlPackage-agent-management-all-endpoints-webport-2]
capability = edit_deployment_server
capability.get = list_deployment_server
match = /agent-management/*/*
requireAuthentication = true

[local-proxy:tlPackage-agent-management-all-endpoints-webport-3]
capability = edit_deployment_server
capability.get = list_deployment_server
match = /agent-management/*/*/*
requireAuthentication = true

[local-proxy:tlPackage-agent-management-all-endpoints-webport-4]
capability = edit_deployment_server
capability.get = list_deployment_server
match = /agent-management/*/*/*/*
requireAuthentication = true

[local-proxy:tlPackage-agent-management-all-endpoints-webport-5]
capability = edit_deployment_server
capability.get = list_deployment_server
match = /agent-management/*/*/*/*/*
requireAuthentication = true

[local-proxy:tlPackage-agent-management-effective-configuration]
authKeyStanza = deployment
match = /agent-management/v1/agents/effective-configuration
requireAuthentication = true

[local-proxy:tlPackage-postgres_api_spec]
match = /service/info/specs/v1/openapi.json
requireAuthentication = false

[local-proxy:tlPackage-postgres_backup]
match = /v1/postgres/recovery/backup
requireAuthentication = false

[local-proxy:tlPackage-postgres_postgres_status]
match = /v1/postgres/status
requireAuthentication = false

[local-proxy:tlPackage-postgres_recovery_status]
match = /v1/postgres/recovery/status/*
requireAuthentication = false

[local-proxy:tlPackage-postgres_restore]
match = /v1/postgres/recovery/restore
requireAuthentication = false
