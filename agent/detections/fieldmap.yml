version: 1
dataset: soc_sim_winsec
defaults:
  index: soc_sim
  sourcetype: winsec

fields:
  event_code: event_code
  logon_type: logon_type
  src_ip: src_ip
  dest_host: dest_host
  user: user
  status: status
  process: process
  severity: severity
  category: category
  timestamp: timestamp

entities:
  dc_host_pattern: "DC-*"
  vip_users:
    - administrator
    - admin
    - svc_backup